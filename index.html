<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claf Digital — IA para Clínicas</title>
<link rel="icon" href="assets/claf-logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Syne', 'system-ui', 'sans-serif'],
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          deep: '#0E0B1F',
          primary: '#16122A',
          cyan: { brand: '#00E5FF' },
          red: { cta: '#FF1744' },
        },
      },
    },
  };
</script>

<style>
  :root{
    --bg-deep:#0E0B1F;
    --bg-primary:#16122A;
    --cyan:#00E5FF;
    --red-cta:#FF1744;
  }
  html,body{background:var(--bg-deep);color:#fff;font-family:'Inter',system-ui,sans-serif;}
  body{font-weight:300;-webkit-font-smoothing:antialiased;}
  ::selection{background:rgba(0,229,255,.30);color:#fff;}
  /* hide scrollbar for marquee rows */
  .no-scrollbar::-webkit-scrollbar{display:none;}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
  /* glass utility */
  .glass{
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    transition:all .4s cubic-bezier(.23,1,.32,1);
  }
  .glass-hover-cyan:hover{
    background:rgba(255,255,255,0.07);
    border-color:rgba(0,229,255,0.30);
    box-shadow:0 0 40px rgba(0,229,255,0.08), inset 0 0 0 1px rgba(0,229,255,0.15);
    transform:translateY(-6px);
  }
  .glass-hover-red:hover{
    background:rgba(255,255,255,0.07);
    border-color:rgba(255,23,68,0.30);
    box-shadow:0 0 40px rgba(255,23,68,0.10), inset 0 0 0 1px rgba(255,23,68,0.12);
    transform:translateY(-6px);
  }
  /* gradient text helper */
  .text-grad-cyan{
    background:linear-gradient(135deg,#FFFFFF 0%, #00E5FF 50%, #7B8FFF 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .text-grad-logo{
    background:linear-gradient(120deg,#FFFFFF 0%, #00E5FF 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  /* pulse for CTAs */
  @keyframes pulseRed {
    0% { box-shadow:0 0 0 0 rgba(255,23,68,.55), 0 0 24px rgba(255,23,68,.35); }
    70%{ box-shadow:0 0 0 14px rgba(255,23,68,0), 0 0 30px rgba(255,23,68,.25); }
    100%{box-shadow:0 0 0 0 rgba(255,23,68,0), 0 0 24px rgba(255,23,68,.35); }
  }
  .pulse-red{ animation: pulseRed 2.2s cubic-bezier(.4,0,.2,1) infinite; }
  /* dot pulse */
  @keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.4);opacity:.55;} }
  .dot-pulse{ animation: dotPulse 1.6s ease-in-out infinite; }
  /* typing dots */
  @keyframes blinkOpacity { 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }
  .typing-dot{ animation: blinkOpacity 1.2s infinite; }
  /* waveform bars */
  @keyframes wave {
    0%,100%{ transform: scaleY(.30); }
    50%{ transform: scaleY(1); }
  }
  .wave-bar{ transform-origin: 50% 50%; animation: wave 1.1s ease-in-out infinite; }
  /* marquee */
  @keyframes marqueeL { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @keyframes marqueeR { from{transform:translateX(-50%);} to{transform:translateX(0);} }
  .marquee-track-l{ animation: marqueeL 60s linear infinite; }
  .marquee-track-r{ animation: marqueeR 75s linear infinite; }
  .marquee-pause:hover .marquee-track-l,
  .marquee-pause:hover .marquee-track-r{ animation-play-state: paused; }
  /* call ripple */
  @keyframes ripple { 0%{transform:scale(.85);opacity:.55;} 100%{transform:scale(2.3);opacity:0;} }
  .ring-ripple{ animation: ripple 2.1s cubic-bezier(.4,0,.2,1) infinite; }
  /* slider */
  .claf-slider{
    -webkit-appearance:none; appearance:none;
    width:100%; height:4px; border-radius:2px;
    background: linear-gradient(to right, #00E5FF 0%, #7B8FFF var(--p,50%), rgba(255,255,255,0.08) var(--p,50%), rgba(255,255,255,0.08) 100%);
    outline:none; cursor:pointer;
  }
  .claf-slider::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:22px; height:22px; border-radius:50%;
    background: linear-gradient(135deg,#00E5FF,#7B8FFF);
    box-shadow: 0 0 14px rgba(0,229,255,.55), 0 0 0 6px rgba(0,229,255,.05);
    cursor:pointer; border:0;
  }
  .claf-slider::-moz-range-thumb{
    width:22px; height:22px; border-radius:50%;
    background: linear-gradient(135deg,#00E5FF,#7B8FFF);
    box-shadow: 0 0 14px rgba(0,229,255,.55);
    cursor:pointer; border:0;
  }
  /* scroll mouse */
  @keyframes wheel { 0%{transform:translateY(0);opacity:1;} 60%{opacity:.2;} 100%{transform:translateY(8px);opacity:0;} }
  .mouse-wheel{ animation: wheel 1.6s ease-in-out infinite; }
  /* gradient pricing border */
  .pricing-border{
    position:relative; border-radius:32px;
    background:rgba(255,255,255,.035);
    backdrop-filter:blur(32px) saturate(180%);
    border:1px solid rgba(0,229,255,.12);
  }
  .pricing-border::before{
    content:""; position:absolute; inset:-1px; border-radius:33px; padding:2px;
    background:linear-gradient(90deg, transparent 0%, #00E5FF 30%, #FF1744 50%, #00E5FF 70%, transparent 100%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events:none;
    opacity:.85;
  }
  /* whatsapp chat noise */
  .wa-bg{
    background-color:#0D1117;
    background-image:
      radial-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      radial-gradient(rgba(0,229,255,.02) 1px, transparent 1px);
    background-size: 14px 14px, 22px 22px;
    background-position: 0 0, 7px 11px;
  }
  /* nav links underline */
  .nav-link{position:relative;}
  .nav-link::after{
    content:""; position:absolute; left:0; right:0; bottom:-6px; height:1px;
    background:linear-gradient(90deg,transparent,#00E5FF,transparent);
    transform:scaleX(0); transform-origin:center; transition:transform .35s ease;
  }
  .nav-link:hover::after{ transform:scaleX(1); }
</style>
</head>
<body class="bg-deep text-white">

<div id="root"></div>
